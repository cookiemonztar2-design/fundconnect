{% extends "base.html" %}
{% block title %}{{ action }} Activity{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">{{ action }} Fundraising Activity</h1>
  <a href="{{ url_for('fr_activities') }}" class="btn">← Back</a>
</div>

<div style="background: #fff; border: 1px solid #e8e6e0; border-radius: 12px; padding: 28px; max-width: 520px;">
  <form method="POST">

    <div class="form-group">
      <label>Title <span style="color: #d85a30;">*</span></label>
      <input type="text" name="title" value="{{ form.title or '' }}" required
             placeholder="e.g. Save the Reef">
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea name="description" placeholder="Describe your campaign…">{{ form.description or '' }}</textarea>
    </div>

    <div class="form-group">
      <label>Category <span style="color: #d85a30;">*</span></label>
      <select name="category_id">
        {% for c in categories %}
          <option value="{{ c.id }}"
            {{ "selected" if (form.category_id | string) == (c.id | string) }}>
            {{ c.name }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label>Target Amount ($) <span style="color: #d85a30;">*</span></label>
      <input type="number" name="target_amount" value="{{ form.target_amount or '' }}"
             required min="1" step="0.01" placeholder="e.g. 5000">
    </div>

    <div class="form-group">
      <label>Deadline <span style="color: #d85a30;">*</span></label>
      <input type="date" name="deadline" value="{{ form.deadline or '' }}" required>
    </div>

    <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
      <a href="{{ url_for('fr_activities') }}" class="btn">Cancel</a>
      <button type="submit" class="btn btn-primary" style="width: auto;">
        {{ action }} Activity
      </button>
    </div>

  </form>
</div>

{% endblock %}
